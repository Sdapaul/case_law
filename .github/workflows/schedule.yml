name: 판례 자동 알림

on:
  schedule:
    # 매일 오전 7시 KST (= 22:00 UTC 전날)
    - cron: '0 22 * * *'
    # 매일 오후 3시 KST (= 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (이메일 미발송, 결과만 출력)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write  # sent_cases.json 커밋을 위해 필요

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 판례 크롤링 및 이메일 발송
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: 발송 이력 저장 (sent_cases.json 커밋)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sent_cases.json
          git diff --staged --quiet || git commit -m "chore: update sent_cases.json [skip ci]"
          git push || true
